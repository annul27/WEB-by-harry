<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
        <li><a href="https://www.amazon.in/ref=nav_logo" id="amazon">annul.in</a></li>
        <li>Deliver to,</li>
        <li id="cat"><select name="categories">
          <option value="all">All</option>
          <option value="alexaskills">Alexa skills</option>
          <option value="baby">Baby</option>
          <option value="beauty">Beauty</option>
          <option value="books">Books</option>
        </select>
        </li>
        <li id="sbox"><input type="text" name="search" placeholder="Search amazon.in"></li>
        <li><button></button></li>
        <li><select name="language" id="lang">
          <option value="eng">Eng</option>
          <option value="hin">Hindi</option>
          <option value="rus">Russian</option>
          <option value="jap">Japenese</option>
          <option value="span">Spanish</option>
        </select></li>
        <li><a href="https://www.amazon.in/gp/css/homepage.html?ref_=nav_youraccount_btn">Hello, User</a></li>
        <li><a href="https://www.amazon.in/gp/css/order-history?ref_=nav_orders_first">Returns & Orders</a></li>
        <li><a href="https://www.amazon.in/gp/cart/view.html?ref_=nav_cart">Cart</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div id="container">
        <div class="content1"></div>
        <div class="content2"></div>
      </div>
      <div class="content3">Welcome to this Sigma Web Developement Express</div>
      <div id="circle"></div>
    </main>
    <footer>
      <pre>
      Condition of Use & Sale    Privacy Notice    Interest-Based Ads
      © 1996-2025, Amazon.com, Inc. or its affiliates
    </pre> 
    </footer>
  </body>
</html>
